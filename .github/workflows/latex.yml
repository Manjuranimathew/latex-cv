name: Build LaTeX CV

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Profile_main.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: latex-pdf
          path: Profile_main.pdf
